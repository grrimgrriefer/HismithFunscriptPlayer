<!--  static/editor.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funscript Editor</title>
    <link rel="stylesheet" href="/site/static/styles.css">
</head>

<body>
    <div id="editor-container">
        <div id="video-section">
            <video id="editor-video" controls></video>
            <canvas id="editor-canvas"></canvas>
        </div>
        <div id="controls-section">
            <h1>Funscript Editor</h1>
            <p>Play the video. Tap (Spacebar) for thrusts. Click/drag on the timeline to edit.</p>
            <label style="color:#ddd;">Variant (optional)</label>
            <input id="variant-input" list="variant-list" type="text" placeholder="e.g. low, high" class="variant-input-field" />
            <datalist id="variant-list"></datalist>
            <button id="tap-button" class="btn">Tap Thrust</button>
            <button id="undo-button" class="btn">Undo Last Tap</button>
            <button id="delete-button" class="btn">Delete Selected</button>
            <button id="save-button" class="btn">Save Funscript</button>
            <a href="/site/" id="back-link">Back to Player</a>
            <div id="action-counter">Taps: 0</div>
        </div>
    </div>
    <script src="/site/static/editor.js" type="module"></script>
</body>

</html>
