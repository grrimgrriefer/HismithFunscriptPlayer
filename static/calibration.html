<!--  static/calibration.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Calibration</title>
    <link rel="stylesheet" href="/site/static/styles.css">
</head>
<body>
    <div class="card">
        <h2>Calibration</h2>
        <p class="small">Select a preset intensity, then adjust the multiplier so the on-screen spinner matches the real device. Confirm to store the multiplier in-memory.</p>

        <div class="preset-row" id="preset-buttons"></div>

        <div class="row" style="align-items:center; gap:8px; margin-bottom:8px;">
            <label class="small" for="profile-select">Profile:</label>
            <select id="profile-select" style="flex:1; max-width:220px;"></select>
            <input id="profile-name" type="text" placeholder="New name..." style="width:140px; margin-left:6px;" />
        </div>

        <div id="spinner-wrap">
            <div class="spinner-ring" aria-hidden="true">
                <div class="tick" style="transform: translate(-50%,-50%) rotate(0deg) translateY(-52px);"></div>
                <div class="tick" style="transform: translate(-50%,-50%) rotate(60deg) translateY(-52px);"></div>
                <div class="tick" style="transform: translate(-50%,-50%) rotate(120deg) translateY(-52px);"></div>
                <div class="tick" style="transform: translate(-50%,-50%) rotate(180deg) translateY(-52px);"></div>
                <div class="tick" style="transform: translate(-50%,-50%) rotate(240deg) translateY(-52px);"></div>
                <div class="tick" style="transform: translate(-50%,-50%) rotate(300deg) translateY(-52px);"></div>
            </div>

            <div id="calibration-spinner" aria-hidden="true" tabindex="0" role="button" title="Click to reset rotation to 0" style="cursor:pointer;">
                <div id="calibration-rotor" aria-hidden="true"></div>
            </div>
        </div>

        <div class="controls">
            <label class="muted">Multiplier: <span id="multiplier-value">1.00</span>x</label>

            <div class="row" style="gap:6px; margin-top:8px;">
                <button id="mult-dec-large" class="preset-btn">-0.10</button>
                <button id="mult-dec-small" class="preset-btn">-0.01</button>
                <input id="multiplier-input" type="number" step="0.01" min="0.50" max="3.00" value="1.00" style="width:80px; text-align:center;" />
                <button id="mult-inc-small" class="preset-btn">+0.01</button>
                <button id="mult-inc-large" class="preset-btn">+0.10</button>
            </div>

            <div class="row" style="margin-top:10px;">
                <button id="start-button" class="preset-btn">Start</button>
                <button id="stop-button" class="preset-btn">Stop</button>
                <button id="reset-button" class="preset-btn">Reset</button>
            </div>
        </div>

        <div id="info" class="small">
            <div>Selected preset: <span id="selected-preset">—</span></div>
            <div>Target spins/sec: <span id="target-spin">—</span></div>
            <div>Sent intensity (normalized): <span id="sent-intensity">—</span></div>
        </div>

        <div id="mapping-list" class="small"></div>
        <canvas id="mapping-canvas" style="width:100%; height:120px; display:block; margin-top:10px;"></canvas>
    </div>

    <script type="module">
        import { setup } from '/site/static/calibration.js';
        document.addEventListener('DOMContentLoaded', setup);
    </script>
</body>
</html>
