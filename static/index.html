<!--  static/index.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Player</title>
    <link rel="stylesheet" href="/site/static/styles.css">
</head>

<body>
    <div id="app">
        <div id="directory-container">
            <h1>Video Player</h1>
            <div id="search-container-placeholder"></div>
            <div id="directory-tree"></div>
        </div>
        <div id="video-container" class="hidden">
            <div id="video-wrapper">
                <div id="video-player"></div>
                <div id="video-error-overlay" class="hidden">
                    <div class="error-content">
                        <h3>Playback Error</h3>
                        <p id="video-error-text"></p>
                    </div>
                </div>
            </div>
        </div>
        <button id="toggle-directory">Toggle Directory</button>
        <button id="settings-button" class="player-button btn" style="right:10px; display:block;">Settings</button>

        <div id="settings-menu" class="settings-menu" aria-hidden="true">
            <div class="form-group">
                <label class="settings-label" style="display:block;">SBS 3D Mode:</label>
                <input type="checkbox" id="sbs-toggle" style="width: auto;">
            </div>
            <div class="form-group">
                <button id="loop-toggle" class="btn">Loop: Off</button>
            </div>

            <label class="settings-label">Funscript Variant:</label>
            <div class="variant-row">
                <select id="funscript-variant-select" class="settings-select">
                    <option value="original">original</option>
                </select>
                <button id="refresh-variants-button" class="btn btn-sm">Refresh</button>
            </div>

            <div class="form-group" style="margin-top:8px;">
                <button id="calibration-button" class="btn btn-sm">Calibration</button>
            </div>

            <label class="settings-label" style="margin-top:8px;">Max Intensity Limit:</label>
            <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
                <button id="hard-limit-lock-button" class="btn btn-sm">Unlock</button>
                <input id="hard-limit-input" class="settings-input" type="number" min="0" max="100" value="60" disabled />
            </div>

            <label class="settings-label">Vibrate Mode:</label>
            <select id="vibrate-mode-select" class="settings-select">
                <option value="Rate">Rate</option>
                <option value="Beat">Beat</option>
            </select>

            <div style="margin-top:10px;">
                <button id="open-editor-button" class="btn">Open Editor</button>
            </div>
        </div>
    </div>
    <script src="/site/static/main.js" type="module"></script>
</body>

</html>
